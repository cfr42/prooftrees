\ProvidesFileSVN{$Id: mmzx-support.cfg 11723 2026-03-04 00:26:28Z cfrees $}
\ExplSyntaxOn
\cs_new_protected_nopar:Npn \__mmzx_test_mmz:n #1
{
  \file_if_exist:nTF {#1.mmz}
  {
    \TYPE{#1.mmz:}
    \NEWLINE
    \SHOWFILE{#1.mmz}
  }{
    \TYPE{CANNOT~FIND~#1.mmz}
  }
}
\cs_generate_variant:Nn \__mmzx_test_mmz:n {V}
\cs_new_protected_nopar:Npn \TESTMMZ 
{
  \__mmzx_test_mmz:V \jobname
}
\cs_new_protected:Npn \__mmzx_test_out_and_memos:nnnn #1#2#3#4
{
  \TEST{#1}{
    \showoutput
    #2
  }
  \__mmzx_test_aux:nnn {#1}{#3}{#4}
}
\cs_new_protected:Npn \__mmzx_test_out_and_memos_paired:nnn #1#2#3
{
  \TEST{#1}{
    \showoutput
    #2
  }
  \__mmzx_test_pairs_aux:nn {#1}{#3}
}
\cs_new_protected:Npn \__mmzx_test_memos:nnnn #1#2#3#4
{
  \OMIT
  #2
  \TIMO
  \__mmzx_test_aux:nnn {#1}{#3}{#4}
}
\cs_new_protected:Npn \__mmzx_test_memos_paired:nnn #1#2#3
{
  \OMIT
  #2
  \TIMO
  \__mmzx_test_pairs_aux:nnn {#1}{#3}
}
\cs_new_protected:Npn \__mmzx_test_aux:nnn #1#2#3
{
  \TEST{#1-cmemo}{
    \IfFileExists{memos/#2.memo}{
      \TYPE{memos/#2.memo:}
      \NEWLINE
      \SHOWFILE{memos/#2.memo}
    }{
      \TYPE{CANNOT~FIND~memos/#2.memo!}
    }
  }
  \TEST{#1-ccmemo}{
    \clist_map_inline:nn {#3}
    {
      \IfFileExists{memos/#2-##1.memo}{
        \TYPE{memos/#2-##1.memo:}
        \NEWLINE
        \SHOWFILE{memos/#2-##1.memo}
      }{
        \TYPE{CANNOT~FIND~memos/#2-##1.memo!}
      }
    }
  }
}
\cs_new_protected:Npn \__mmzx_test_pairs_aux:nnn #1#2
{
  \clist_map_inline:nn {#2}
  {
    \seq_set_split:Nnn \l_tmpa_seq {/} {##1}
    \seq_pop:NN \l_tmpa_seq \l_tmpa_tl
    \seq_pop:NN \l_tmpa_seq \l_tmpb_tl
    \TEST{#1-cmemo-ccmemo}{
      \exp_args:Ne
      \IfFileExists{memos/\l_tmpa_tl.memo}{
        \exp_args:Ne
        \TYPE{memos/\l_tmpa_tl.memo:}
        \NEWLINE
        \exp_args:Ne
        \SHOWFILE{memos/\l_tmpa_tl.memo}
      }{
        \exp_args:Ne
        \TYPE{CANNOT~FIND~memo/\l_tmpa_tl.memo!}
      }
      \NEWLINE
      \exp_args:Ne
      \IfFileExists{memos/\l_tmpa_tl-\l_tmpb_tl.memo}{
        \exp_args:Ne
        \TYPE{memos/\l_tmpa_tl-\l_tmpb_tl.memo:}
        \NEWLINE
        \exp_args:Ne
        \SHOWFILE{memos/\l_tmpa_tl-\l_tmpb_tl.memo}
      }{
        \exp_args:Ne
        \TYPE{CANNOT~FIND~memos/\l_tmpa_tl-\l_tmpb_tl.memo!}
      }
    }
  }
}
\makeatletter
\cs_new_protected_nopar:Npn \TESTMEMOIZATION 
{
  \@ifstar \__mmzx_test_memos:nnnn \__mmzx_test_out_and_memos:nnnn 
}
\cs_new_protected_nopar:Npn \TESTMEMOPAIRS
{
    \@ifstar \__mmzx_test_memos_paired:nnn \__mmzx_test_out_and_memos_paired:nnn
}
\makeatother
\ExplSyntaxOff
